<!DOCTYPE html>
<html>
<head>
    <title>Wordle</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Wordle</h1>

<div style="margin-bottom:15px;">
    <button onclick="startNewGame('easy')">Easy</button>
    <button onclick="startNewGame('hard')">Hard</button>
</div>

<div id="board"></div>
<div id="keyboard"></div>
<div id="message"></div>

<script>
const board = document.getElementById("board");
const message = document.getElementById("message");
const keyboard = document.getElementById("keyboard");

let row = 0;
let col = 0;
let gameOver = false;
let currentGuess = "";
let keyStates = {};

// ---------------- Create Board ----------------
for (let r = 0; r < 6; r++) {
    let rowDiv = document.createElement("div");
    rowDiv.className = "row";
    for (let c = 0; c < 5; c++) {
        let tile = document.createElement("div");
        tile.className = "tile";
        tile.id = `tile-${r}-${c}`;
        rowDiv.appendChild(tile);
    }
    board.appendChild(rowDiv);
}

// ---------------- Keyboard ----------------
const layout = [
    "QWERTYUIOP",
    "ASDFGHJKL",
    "ZXCVBNM"
];

layout.forEach((letters, index) => {
    const rowDiv = document.createElement("div");
    rowDiv.className = "key-row";

    if (index === 2) {
        const enterKey = document.createElement("div");
        enterKey.className = "key special";
        enterKey.innerText = "ENTER";
        enterKey.onclick = submitGuess;
        rowDiv.appendChild(enterKey);
    }

    letters.split("").forEach(letter => {
        const key = document.createElement("div");
        key.className = "key";
        key.id = "key-" + letter;
        key.innerText = letter;
        key.onclick = () => addLetter(letter);
        rowDiv.appendChild(key);
    });

    if (index === 2) {
        const backKey = document.createElement("div");
        backKey.className = "key special";
        backKey.innerText = "⌫";
        backKey.onclick = removeLetter;
        rowDiv.appendChild(backKey);
    }

    keyboard.appendChild(rowDiv);
});

// ---------------- Typing Logic ----------------
function addLetter(letter) {
    if (gameOver || col >= 5) return;

    const tile = document.getElementById(`tile-${row}-${col}`);
    tile.innerText = letter;
    currentGuess += letter.toLowerCase();
    col++;
}

function removeLetter() {
    if (gameOver || col === 0) return;

    col--;
    const tile = document.getElementById(`tile-${row}-${col}`);
    tile.innerText = "";
    currentGuess = currentGuess.slice(0, -1);
}

async function submitGuess() {
    if (gameOver || currentGuess.length !== 5) return;

    const res = await fetch("/guess", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({guess: currentGuess})
    });

    const data = await res.json();

    if (data.error) {
        message.innerText = data.error;
        return;
    }

    for (let i = 0; i < 5; i++) {
        const tile = document.getElementById(`tile-${row}-${i}`);
        tile.classList.add(data.pattern[i]);

        const letter = currentGuess[i].toUpperCase();
        const result = data.pattern[i];
        const key = document.getElementById("key-" + letter);

        const current = keyStates[letter];

        if (result === "G" ||
            (result === "Y" && current !== "G") ||
            (result === "B" && !current)) {

            keyStates[letter] = result;
            key.classList.remove("G", "Y", "B");
            key.classList.add(result);
        }
    }

    if (data.game_over) {
        gameOver = true;
        if (data.pattern === "GGGGG") {
            message.innerText = "Correct! The word was " + data.final_word.toUpperCase();
        } else {
            message.innerText = "Unlucky. The word was " + data.final_word.toUpperCase();
        }
        return;
    }

    row++;
    col = 0;
    currentGuess = "";
}

// ---------------- Physical Keyboard ----------------
document.addEventListener("keydown", function(event) {
    if (gameOver) return;

    const key = event.key;

    if (/^[a-zA-Z]$/.test(key)) {
        addLetter(key.toUpperCase());
    } else if (key === "Backspace") {
        removeLetter();
    } else if (key === "Enter") {
        submitGuess();
    }
});

// ---------------- Mode Switch ----------------
function startNewGame(mode) {
    fetch("/new_game", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({mode})
    }).then(() => {
        location.reload();
    });
}
</script>

</body>
</html>
