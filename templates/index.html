<!DOCTYPE html>
<html>
<head>
    <title>Wordle</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Wordle</h1>

<div class="mode-tabs">
    <button class="mode-btn" id="mode-easy" onclick="startNewGame('easy')">Easy</button>
    <button class="mode-btn" id="mode-hard" onclick="startNewGame('hard')">Hard</button>
    <button class="mode-btn" id="mode-daily_easy" onclick="startNewGame('daily_easy')">Daily Easy</button>
    <button class="mode-btn" id="mode-daily_hard" onclick="startNewGame('daily_hard')">Daily Hard</button>
</div>

<div id="board"></div>
<div id="keyboard"></div>
<div id="message"></div>

<script>
const board = document.getElementById("board");
const message = document.getElementById("message");
const keyboard = document.getElementById("keyboard");

let row = 0;
let col = 0;
let gameOver = false;
let currentGuess = "";
let keyStates = {};

// Create board
for (let r = 0; r < 6; r++) {
    let rowDiv = document.createElement("div");
    rowDiv.className = "row";
    for (let c = 0; c < 5; c++) {
        let tile = document.createElement("div");
        tile.className = "tile";
        tile.id = `tile-${r}-${c}`;
        rowDiv.appendChild(tile);
    }
    board.appendChild(rowDiv);
}

// Keyboard layout
const layout = [
    "QWERTYUIOP",
    "ASDFGHJKL",
    "ZXCVBNM"
];

layout.forEach((letters, index) => {
    const rowDiv = document.createElement("div");
    rowDiv.className = "key-row";

    if (index === 2) {
        const enterKey = document.createElement("div");
        enterKey.className = "key special";
        enterKey.innerText = "ENTER";
        enterKey.onclick = submitGuess;
        rowDiv.appendChild(enterKey);
    }

    letters.split("").forEach(letter => {
        const key = document.createElement("div");
        key.className = "key";
        key.id = "key-" + letter;
        key.innerText = letter;
        key.onclick = () => addLetter(letter);
        rowDiv.appendChild(key);
    });

    if (index === 2) {
        const backKey = document.createElement("div");
        backKey.className = "key special";
        backKey.innerText = "⌫";
        backKey.onclick = removeLetter;
        rowDiv.appendChild(backKey);
    }

    keyboard.appendChild(rowDiv);
});

function applyKeyboardFromGuess(word, pattern) {
    for (let i = 0; i < 5; i++) {
        const letter = word[i].toUpperCase();
        const result = pattern[i];
        const key = document.getElementById("key-" + letter);
        if (!key) continue;

        const current = keyStates[letter];

        if (result === "G") {
            keyStates[letter] = "G";
        } else if (result === "Y") {
            if (current !== "G") keyStates[letter] = "Y";
        } else if (result === "B") {
            if (!current) keyStates[letter] = "B";
        }
    }

    for (const [letter, state] of Object.entries(keyStates)) {
        const key = document.getElementById("key-" + letter);
        key.classList.remove("G", "Y", "B");
        key.classList.add(state);
    }
}

async function loadExistingState() {
    const res = await fetch("/get_state");
    const game = await res.json();

    if (!game.guesses) return;

    for (let r = 0; r < game.guesses.length; r++) {
        const guess = game.guesses[r];

        for (let c = 0; c < 5; c++) {
            const tile = document.getElementById(`tile-${r}-${c}`);
            tile.innerText = guess.word[c].toUpperCase();
            tile.classList.add(guess.pattern[c]);
        }

        applyKeyboardFromGuess(guess.word, guess.pattern);
        row++;
    }

    if (game.game_over) gameOver = true;

    highlightActiveMode(game.mode);
}

function highlightActiveMode(mode) {
    document.querySelectorAll(".mode-btn").forEach(btn => {
        btn.classList.remove("active");
    });
    const activeBtn = document.getElementById("mode-" + mode);
    if (activeBtn) activeBtn.classList.add("active");
}

async function submitGuess() {
    if (gameOver || currentGuess.length !== 5) return;

    const res = await fetch("/guess", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({guess: currentGuess})
    });

    const data = await res.json();

    if (data.error) {
        message.innerText = data.error;
        return;
    }

    for (let i = 0; i < 5; i++) {
        const tile = document.getElementById(`tile-${row}-${i}`);
        tile.innerText = currentGuess[i].toUpperCase();
        tile.classList.add(data.pattern[i]);
    }

    applyKeyboardFromGuess(currentGuess, data.pattern);

    if (data.game_over) {
        gameOver = true;
        message.innerText =
            data.pattern === "GGGGG"
                ? "Correct! The word was " + data.final_word.toUpperCase()
                : "Unlucky. The word was " + data.final_word.toUpperCase();
        return;
    }

    row++;
    col = 0;
    currentGuess = "";
}

function addLetter(letter) {
    if (gameOver || col >= 5) return;
    const tile = document.getElementById(`tile-${row}-${col}`);
    tile.innerText = letter;
    currentGuess += letter.toLowerCase();
    col++;
}

function removeLetter() {
    if (gameOver || col === 0) return;
    col--;
    const tile = document.getElementById(`tile-${row}-${col}`);
    tile.innerText = "";
    currentGuess = currentGuess.slice(0, -1);
}

function startNewGame(mode) {
    fetch("/new_game", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({mode})
    }).then(() => location.reload());
}

document.addEventListener("keydown", function(event) {
    if (gameOver) return;
    const key = event.key;

    if (/^[a-zA-Z]$/.test(key)) {
        addLetter(key.toUpperCase());
    } else if (key === "Backspace") {
        removeLetter();
    } else if (key === "Enter") {
        submitGuess();
    }
});

window.onload = loadExistingState;
</script>

</body>
</html>
